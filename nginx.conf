server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback so deep links and the audience window route resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed Vite assets are immutable — cache them aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Everything else (index.html, manifest, sw): no cache so updates land instantly.
  location ~* \.(html|webmanifest|json)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
